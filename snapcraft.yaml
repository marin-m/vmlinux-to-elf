name: vmlinux-to-elf # you probably want to 'snapcraft register <name>'
adopt-info: share
title: vmlinux-to-elf
license: GPL-3.0+
base: core24 # the base snap is the execution environment for this snap
version: '1.2.1' # just for humans, typically '1.2+git' or '1.3.2'

grade: stable # must be 'stable' to release into candidate/stable channels
confinement: strict # use 'strict' once you have the right plugs and slots

apps:
  vmlinux-to-elf:
    command: bin/vmlinux-to-elf
    plugs:
      - home

  gui:
    command: bin/vmlinux-to-elf-gui
    desktop: usr/share/applications/re.fossplant.vmlinux-to-elf.desktop
    extensions: [gnome]
    plugs:
      - home
      - unity7

  kallsyms-finder:
    command: bin/kallsyms-finder
    plugs:
      - home

parts:
  vmlinux-to-elf:
    plugin: python
    source: .

    stage-packages:
      - libdrm-common
      - libproxy1v5

  share:
    plugin: dump
    source: vmlinux_to_elf/ui/assets/
    parse-info: [re.fossplant.vmlinux-to-elf.metainfo.xml]
    source-type: local

    override-pull: |
      snapcraftctl pull

      rm -f *.ui *.cmb *.sh *.gresource*

      # Point icon to the correct location
      sed -i -e 's|Icon=re.fossplant.vmlinux-to-elf|Icon=/usr/share/icons/hicolor/scalable/apps/re.fossplant.vmlinux-to-elf.svg|g' re.fossplant.vmlinux-to-elf.desktop
      install -Dm644 re.fossplant.vmlinux-to-elf.metainfo.xml -t usr/share/metainfo/
      install -Dm644 re.fossplant.vmlinux-to-elf.desktop -t usr/share/applications/
      install -Dm644 re.fossplant.vmlinux-to-elf.svg -t usr/share/icons/hicolor/scalable/apps/

layout:
  /usr/lib/$CRAFT_ARCH_TRIPLET_BUILD_FOR/libproxy:
    bind: $SNAP/usr/lib/$CRAFT_ARCH_TRIPLET_BUILD_FOR/libproxy
  /usr/share/libdrm:
    bind: $SNAP/usr/share/libdrm
